name: Build and Push Docker Image to ECR

on:
  workflow_dispatch:

  push:
    branches:
      - main
    paths:
      - "app/**"
      - ".github/workflows/docker-build-push.yml"

jobs:
  build-and-push:
    name: Build and Push Docker Image
    runs-on: ubuntu-22.04
    permissions:
      contents: read
      id-token: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::965384155823:role/gatus-github-ecr-role
          role-session-name: gatus-ecr-${{ github.run_id }}
          aws-region: eu-west-2

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Set image tag
        run: echo "IMAGE_TAG=${GITHUB_SHA::7}" >> $GITHUB_ENV

      - name: Build Docker image
        run: |
          docker buildx build \
            --platform linux/amd64 \
            -t 965384155823.dkr.ecr.eu-west-2.amazonaws.com/gatus-repo:$IMAGE_TAG \
            -f app/Dockerfile \
            --load .

      - name: Scan Docker image with Trivy
        uses: aquasecurity/trivy-action@v0.35.0
        with:
          image-ref: 965384155823.dkr.ecr.eu-west-2.amazonaws.com/gatus-repo:${{ env.IMAGE_TAG }}
          format: table
          exit-code: "1"
          severity: CRITICAL,HIGH

      - name: Push Docker image to ECR
        run: |
          docker push 965384155823.dkr.ecr.eu-west-2.amazonaws.com/gatus-repo:$IMAGE_TAG
